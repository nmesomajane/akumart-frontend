name: vulnerability scan and lint test

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  # JOB 1 – TypeScript Type Check
  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type check
        run: npx tsc -b --noEmit

  # JOB 2 – ESLint formatting & linting
  lint:
    name: ESLint & Code Formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint (save output as artifact)
        run: npm run lint 2>&1 | tee eslint-report.txt
        continue-on-error: true

      - name: Upload ESLint report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eslint-report
          path: eslint-report.txt
          retention-days: 14

      # Run again without tee so the job exit code is respected
      - name: Assert lint passes
        run: npm run lint

  # JOB 3 – Trivy filesystem for vulnerability scan
  trivy-fs-scan:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # 1. HTML → viewable artifact 
      - name: Run Trivy (HTML report)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: "."
          format: template
          template: "@/contrib/html.tpl"
          output: trivy-report.html
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: false
          vuln-type: "os,library"

      # 2. Plaintext artifact
      - name: Run Trivy (Plain Text)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: "."
          format: table
          output: trivy-results.txt
          severity: CRITICAL,HIGH
          exit-code: "1"            # ← Fails the job if CRITICAL or HIGH found
          ignore-unfixed: false
          vuln-type: "os,library"

      # Upload reports regardless of whether the scan passed or failed
      - name: Upload Trivy reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-security-report
          path: |
            trivy-report.html
            trivy-results.txt
          retention-days: 30